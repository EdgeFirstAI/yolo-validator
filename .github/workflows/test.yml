name: test
on: [push, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # CPU torch/torchvision up front so the [torch] extra (and the
      # ultralytics it pulls) resolve to CPU wheels, not the multi-GB CUDA
      # builds. This lets the torch-fidelity tests actually run in CI.
      - run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -e '.[onnx,torch,dev]'
      - run: pytest -v --cov=yolo_validator --cov-report=term-missing --cov-fail-under=70
