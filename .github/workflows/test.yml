name: test
on: [push, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e '.[onnx,dev]'
      - run: pytest -v --cov=yolo_validator --cov-report=term-missing --cov-fail-under=70
